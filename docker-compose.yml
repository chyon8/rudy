services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rudy
      POSTGRES_PASSWORD: rudy
      POSTGRES_DB: rudy
    ports:
      - '5432:5432'
    volumes:
      - rudy-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rudy']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rudy-db:
